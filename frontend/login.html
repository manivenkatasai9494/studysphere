<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — StudySphere AI</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">StudySphere AI</div>
      <p class="logo-sub">Sign in to continue learning</p>
      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" id="submit-btn">Sign In</button>
      </form>
      <p class="auth-links">
        <a href="/forgot-password.html">Forgot password?</a><br><br>
        Don't have an account? <a href="/register.html">Register</a>
      </p>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    if (api.getToken()) window.location.href = '/dashboard.html';
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      try {
        const data = await api.post('/auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        });
        api.setTokens(data.access_token, data.refresh_token, data.user_id, data.email);
        window.location.href = '/dashboard.html';
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
