<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — StudySphere AI</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="app"></div>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.getElementById('app').innerHTML = appLayoutHTML('/profile.html', 'Profile');
    initAppLayout('/profile.html', 'Profile');

    document.getElementById('page-content').innerHTML = `
      <div class="card">
        <h2>Your Profile</h2>
        <div class="form-group"><label>Full Name</label><input id="full_name"></div>
        <div class="form-group"><label>Email</label><input id="email" disabled></div>
        <div class="form-group"><label>Avatar URL</label><input id="avatar_url" placeholder="https://..."></div>
        <button class="btn btn-primary" id="save-profile">Save Profile</button>
      </div>
      <div class="stats-grid" id="stats"></div>
    `;

    api.get('/profile/me').then(p => {
      document.getElementById('full_name').value = p.full_name || '';
      document.getElementById('email').value = p.email || localStorage.getItem('user_email') || '';
      document.getElementById('avatar_url').value = p.avatar_url || '';
    });

    document.getElementById('save-profile').onclick = async () => {
      await api.patch('/profile/me', {
        full_name: document.getElementById('full_name').value,
        avatar_url: document.getElementById('avatar_url').value || null,
      });
      showToast('Profile updated', 'success');
    };

    api.get('/profile/dashboard-stats').then(stats => {
      document.getElementById('stats').innerHTML = Object.entries(stats).map(([k,v]) => `
        <div class="stat-card"><div class="value">${v}</div><div class="label">${k.replace(/_/g,' ')}</div></div>
      `).join('');
    });
  </script>
</body>
</html>
