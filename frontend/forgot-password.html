<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — StudySphere AI</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">Reset Password</div>
      <p class="logo-sub">We'll send you a reset link</p>
      <form id="forgot-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required>
        </div>
        <button type="submit" class="btn btn-primary">Send Reset Link</button>
      </form>
      <p class="auth-links"><a href="/login.html">Back to login</a></p>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        await api.post('/auth/forgot-password', { email: document.getElementById('email').value });
        showToast('Check your email for reset instructions', 'success');
      } catch (err) { showToast(err.message, 'error'); }
    });
  </script>
</body>
</html>
