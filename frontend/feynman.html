<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feynman Checker — StudySphere AI</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="app"></div>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.getElementById('app').innerHTML = appLayoutHTML('/feynman.html', 'Feynman Technique');
    initAppLayout('/feynman.html', 'Feynman Technique');
    let sessionId = null;

    document.getElementById('page-content').innerHTML = `
      <div class="card" id="start-panel">
        <h2>Explain a Concept</h2>
        <div class="form-group"><label>Topic</label><input id="topic" placeholder="e.g. Photosynthesis"></div>
        <button class="btn btn-primary" id="start-btn">Start Session</button>
      </div>
      <div class="card hidden" id="explain-panel">
        <p id="ai-prompt" style="margin-bottom:1rem;color:var(--text-muted)"></p>
        <div class="form-group"><label>Your Explanation</label><textarea id="explanation" rows="8" placeholder="Explain in simple terms..."></textarea></div>
        <button class="btn btn-primary" id="eval-btn">Submit for Evaluation</button>
      </div>
      <div id="results" class="card hidden"></div>
      <div class="card"><h2>Previous Sessions</h2><div id="history"></div></div>
    `;

    document.getElementById('start-btn').onclick = async () => {
      const topic = document.getElementById('topic').value.trim();
      if (!topic) return;
      const res = await api.post('/feynman/start', { topic });
      sessionId = res.session_id;
      document.getElementById('start-panel').classList.add('hidden');
      document.getElementById('explain-panel').classList.remove('hidden');
      document.getElementById('ai-prompt').textContent = res.prompt;
      loadHistory();
    };

    document.getElementById('eval-btn').onclick = async () => {
      const res = await api.post('/feynman/evaluate', {
        session_id: sessionId,
        explanation: document.getElementById('explanation').value,
      });
      document.getElementById('results').classList.remove('hidden');
      document.getElementById('results').innerHTML = `
        <div class="result-score">Understanding Score: ${res.understanding_score}%</div>
        ${formatStructuredData(res.evaluation)}
      `;
      loadHistory();
    };

    async function loadHistory() {
      const data = await api.get('/feynman/sessions');
      document.getElementById('history').innerHTML = (data.sessions || []).map(s => `
        <p><strong>${s.topic}</strong> — Score: ${s.understanding_score || '—'}% — ${new Date(s.created_at).toLocaleDateString()}</p>
      `).join('') || '<p style="color:var(--text-muted)">No sessions yet</p>';
    }
    loadHistory();
  </script>
</body>
</html>
