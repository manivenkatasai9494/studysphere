<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — StudySphere AI</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="app"></div>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.getElementById('app').innerHTML = appLayoutHTML('/dashboard.html', 'Dashboard');
    initAppLayout('/dashboard.html', 'Dashboard');

    const features = [
      { href: '/tutor.html', title: 'AI Tutor', desc: 'ChatGPT-style learning assistant', icon: '🎓' },
      { href: '/rag.html', title: 'RAG Notes', desc: 'Chat with your study documents', icon: '📄' },
      { href: '/quiz.html', title: 'Quiz Generator', desc: 'Generate and evaluate quizzes', icon: '✅' },
      { href: '/feynman.html', title: 'Feynman Checker', desc: 'Test your understanding', icon: '💡' },
      { href: '/debate.html', title: 'Debate Partner', desc: 'Sharpen arguments with AI', icon: '⚔️' },
      { href: '/career.html', title: 'Career Guidance', desc: 'AI-powered career advice', icon: '🚀' },
      { href: '/planner.html', title: 'Study Planner', desc: 'Smart study schedules', icon: '📅' },
      { href: '/roadmap.html', title: 'Roadmap', desc: 'Learning roadmaps for careers', icon: '🗺️' },
      { href: '/voice.html', title: 'Voice Assistant', desc: 'Hands-free learning', icon: '🎤' },
      { href: '/rooms.html', title: 'Study Rooms', desc: 'Collaborate with peers', icon: '👥' },
    ];

    document.getElementById('page-content').innerHTML = `
      <div class="stats-grid" id="stats"></div>
      <h2 style="margin-bottom:1rem">Learning Tools</h2>
      <div class="feature-grid" id="features"></div>
    `;

    document.getElementById('features').innerHTML = features.map(f => `
      <div class="feature-card" onclick="location.href='${f.href}'">
        <h3>${f.icon} ${f.title}</h3>
        <p>${f.desc}</p>
      </div>
    `).join('');

    api.get('/profile/dashboard-stats').then(stats => {
      document.getElementById('stats').innerHTML = Object.entries(stats).map(([k, v]) => `
        <div class="stat-card"><div class="value">${v}</div><div class="label">${k.replace(/_/g, ' ')}</div></div>
      `).join('');
    }).catch(() => {});
  </script>
</body>
</html>
