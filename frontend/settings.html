<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — StudySphere AI</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="app"></div>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.getElementById('app').innerHTML = appLayoutHTML('/settings.html', 'Settings');
    initAppLayout('/settings.html', 'Settings');

    document.getElementById('page-content').innerHTML = `
      <div class="card">
        <h2>Appearance</h2>
        <p style="color:var(--text-muted);margin-bottom:1rem">Toggle between dark and light mode</p>
        <button class="btn btn-primary" id="theme-btn">Toggle Theme</button>
      </div>
      <div class="card">
        <h2>Account</h2>
        <button class="btn btn-danger" id="logout-all">Logout</button>
      </div>
      <div class="card">
        <h2>About</h2>
        <p>StudySphere AI v1.0.0</p>
        <p style="color:var(--text-muted)">AI-powered learning platform with persistent data storage.</p>
      </div>
    `;

    document.getElementById('theme-btn').onclick = toggleTheme;
    document.getElementById('logout-all').onclick = () => {
      api.clearTokens();
      window.location.href = '/login.html';
    };
  </script>
</body>
</html>
